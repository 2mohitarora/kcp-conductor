apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default-gateway
  namespace: cilium
  annotations:
    # This triggers the dedicated Envoy deployment
    io.cilium.gateway/lb-mode: "dedicated"
spec:
  gatewayClassName: cilium
  listeners:
    - name: default-http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https-passthrough
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
