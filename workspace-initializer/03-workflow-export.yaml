apiVersion: apis.kcp.io/v1alpha1
kind: APIResourceSchema
metadata:
  name: v1.workflows.example.com
spec:
  group: example.com #API group that serve resource. User write apiVersion: example.com/v1alpha1
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
  scope: Namespaced
  versions:
    - name: v1alpha1 # Second part of apiVersion: example.com/v1alpha1
      served: true # Set an old version to served: false after migrating everyone to a newer version.
      storage: true # Only one version can be storage: true
      schema: # OpenAPI v3 schema that validates user input.
        description: "Workflow definition"
        type: object
        properties:
          spec:
            type: object
            properties:
              description:
                type: string
              steps:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
            required:
              - steps
      subresources:
        status: {}
---
apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: workflows # Used in APIBinding definition
spec:
  resources:
    - group: example.com # Must match the group in APIResourceSchema
      name: workflows # Must match schema's spec.names.plural
      schema: v1.workflows.example.com # must match schema's spec.group
      storage:
        crd: {}
