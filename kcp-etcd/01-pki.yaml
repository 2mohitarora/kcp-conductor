# ─── Self-signed bootstrap issuer ────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: etcd-selfsigned
  namespace: etcd
spec:
  selfSigned: {}
---
# ─── Root CA for all etcd certs ──────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: etcd-ca
  secretName: etcd-ca
  duration: 87600h # 10 years
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: etcd-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# ─── Issuer backed by the etcd CA (signs server + peer + client certs) ──
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: etcd-ca-issuer
  namespace: etcd
spec:
  ca:
    secretName: etcd-ca
