# ─── etcd server serving cert ────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-server
  namespace: etcd
spec:
  secretName: etcd-server-tls
  duration: 8760h # 1 year
  renewBefore: 360h # 15 days
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - "etcd-0"
    - "etcd-0.etcd"
    - "etcd-0.etcd.etcd"
    - "etcd-0.etcd.etcd.svc"
    - "etcd-0.etcd.etcd.svc.cluster.local"
    - "localhost"
  ipAddresses:
    - "127.0.0.1"
  issuerRef:
    name: etcd-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
# ─── etcd peer cert (required even for single-node) ─────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-peer
  namespace: etcd
spec:
  secretName: etcd-peer-tls
  duration: 8760h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - "etcd-0"
    - "etcd-0.etcd"
    - "etcd-0.etcd.etcd"
    - "etcd-0.etcd.etcd.svc"
    - "etcd-0.etcd.etcd.svc.cluster.local"
    - "localhost"
  ipAddresses:
    - "127.0.0.1"
  issuerRef:
    name: etcd-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
# ─── Client cert for kcp to authenticate to etcd ────────────────
#
# This cert will need to be copied to the kcp namespace.
# See 04-copy-client-cert.yaml for the Job that does this.
#
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-client-kcp
  namespace: etcd
spec:
  secretName: etcd-client-kcp-tls
  duration: 8760h
  renewBefore: 360h
  commonName: kcp
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - client auth
  issuerRef:
    name: etcd-ca-issuer
    kind: Issuer
    group: cert-manager.io
