# ─── Headless Service (required for StatefulSet DNS) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: etcd
  labels:
    app: etcd
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
---
# ─── Client Service (non-headless, for cross-namespace access) ───
# Other namespaces use: etcd-client.etcd.svc:2379
apiVersion: v1
kind: Service
metadata:
  name: etcd-client
  namespace: etcd
  labels:
    app: etcd
spec:
  type: ClusterIP
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
---
# ─── StatefulSet ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: etcd
  labels:
    app: etcd
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.28
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          command:
            - etcd
          args:
            - --name=etcd-0
            - --data-dir=/var/lib/etcd

            # ── Client listener (TLS) ──
            - --listen-client-urls=https://0.0.0.0:2379
            - --advertise-client-urls=https://etcd-0.etcd.etcd.svc:2379

            # ── Peer listener (TLS) ──
            - --listen-peer-urls=https://0.0.0.0:2380
            - --initial-advertise-peer-urls=https://etcd-0.etcd.etcd.svc:2380
            - --initial-cluster=etcd-0=https://etcd-0.etcd.etcd.svc:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=etcd-kcp

            # ── Server TLS ──
            - --cert-file=/etc/etcd/tls/server/tls.crt
            - --key-file=/etc/etcd/tls/server/tls.key

            # ── Client auth ──
            - --client-cert-auth=true
            - --trusted-ca-file=/etc/etcd/tls/ca/ca.crt

            # ── Peer TLS ──
            - --peer-cert-file=/etc/etcd/tls/peer/tls.crt
            - --peer-key-file=/etc/etcd/tls/peer/tls.key
            - --peer-client-cert-auth=true
            - --peer-trusted-ca-file=/etc/etcd/tls/ca/ca.crt

            # ── Tuning ──
            - --snapshot-count=10000
            - --quota-backend-bytes=8589934592
            - --auto-compaction-mode=periodic
            - --auto-compaction-retention=5m
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
            - name: server-tls
              mountPath: /etc/etcd/tls/server
              readOnly: true
            - name: peer-tls
              mountPath: /etc/etcd/tls/peer
              readOnly: true
            - name: ca
              mountPath: /etc/etcd/tls/ca
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  etcdctl endpoint health \
                    --endpoints=https://localhost:2379 \
                    --cacert=/etc/etcd/tls/ca/ca.crt \
                    --cert=/etc/etcd/tls/server/tls.crt \
                    --key=/etc/etcd/tls/server/tls.key
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  etcdctl endpoint health \
                    --endpoints=https://localhost:2379 \
                    --cacert=/etc/etcd/tls/ca/ca.crt \
                    --cert=/etc/etcd/tls/server/tls.crt \
                    --key=/etc/etcd/tls/server/tls.key
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: server-tls
          secret:
            secretName: etcd-server-tls
        - name: peer-tls
          secret:
            secretName: etcd-peer-tls
        - name: ca
          secret:
            secretName: etcd-ca
            items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 8Gi
