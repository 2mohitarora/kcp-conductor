apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-client-kcp
  namespace: kcp
spec:
  secretName: etcd-client-kcp-tls
  duration: 8760h
  renewBefore: 360h
  commonName: kcp
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - client auth
  issuerRef:
    name: etcd-ca-issuer # Use a ClusterIssuer for cross-namespace
    kind: ClusterIssuer
    group: cert-manager.io
